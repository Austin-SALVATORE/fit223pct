<!--
  Production vector mark — "23%" in the app's own self-hosted Fraunces,
  glyph outlines extracted directly from the variable font (not traced
  from the AI-generated master at mark-alpha.png, which is a design
  reference only). Composition (kerning, % scale/position) is measured
  from the master's own pixel geometry and reapplied here in font units.

  Font source: @fontsource-variable/fraunces's full-axis file
  (fraunces-latin-full-normal.woff2), instanced at wght=900 opsz=144
  WONK=1 SOFT=0 — NOT the wght-only file the running app imports via
  src/ui/index.css. That file pins opsz=9/WONK=0 (Fraunces' text-optical
  cut) regardless of weight, which draws a flat-top "3" and a plain,
  swash-free "2" — confirmed by rendering 700/800/900 from the shipped
  file side by side with this instance. The opsz144/WONK1 instance is
  what actually carries Fraunces' display ball-terminal character (the
  rounded "3", the swash on "2") the master was going for. Owner-approved
  exception: this icon is a static baked asset, not a runtime font
  decision, so it doesn't change what src/ui/index.css loads for the
  app's live text.

  Two irreducible differences from the master remain even at this
  instance and are accepted, not bugs: Fraunces' "3" always has a flat
  diagonal top ("flag" cut) at every axis setting tried — the master's
  fully rounded bowl top isn't a shape this typeface draws. See
  mark-small.svg for the dedicated small-size cut.
-->
