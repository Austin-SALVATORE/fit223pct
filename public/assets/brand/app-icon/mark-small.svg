<!--
  Dedicated small-size cut — "23" alone, no "%" (it's a speck below
  ~32px; see mark.svg). Deliberately sourced from the font the app
  actually ships (@fontsource-variable/fraunces's wght-only file,
  wght=900), not the full-axis instance mark.svg uses: that file pins
  Fraunces' text optical size (opsz=9) and WONK=0, which draws simpler,
  more robust shapes with thicker relative strokes — exactly what stays
  legible at 16-32px, where mark.svg's display-optical swashes would
  blob into noise. See favicon.svg for how the two cuts are switched by
  rendered size.
-->
